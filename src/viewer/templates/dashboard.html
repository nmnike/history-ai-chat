{% extends "base.html" %}

{% block title %}History AI Chat{% endblock %}

{% block content %}
<!-- Stats + Search Row -->
<div class="row mb-3">
    <div class="col-12">
        <div class="d-flex gap-3 flex-wrap align-items-center">
            <!-- Stats -->
            <div class="stat-card">
                <div class="stat-icon">
                    <i class="bi bi-chat-square-text"></i>
                </div>
                <div class="stat-info">
                    <span class="stat-value" id="sessions-count">-</span>
                    <span class="stat-label">Sessions</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon projects">
                    <i class="bi bi-folder"></i>
                </div>
                <div class="stat-info">
                    <span class="stat-value" id="projects-count">-</span>
                    <span class="stat-label">Projects</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon tokens">
                    <i class="bi bi-cpu"></i>
                </div>
                <div class="stat-info">
                    <span class="stat-value" id="tokens-count">-</span>
                    <span class="stat-label">Tokens</span>
                </div>
            </div>

            <!-- Search -->
            <div class="search-panel flex-grow-1">
                <div class="d-flex gap-2 align-items-center">
                    <div class="input-group flex-grow-1">
                        <span class="input-group-text"><i class="bi bi-search"></i></span>
                        <input type="text" id="global-search" class="form-control" placeholder="Search conversations...">
                        <button class="btn btn-primary" type="button" id="search-btn">Search</button>
                    </div>
                    <select id="date-filter" class="form-select" style="width: auto;">
                        <option value="today">Today</option>
                        <option value="yesterday">Yesterday</option>
                        <option value="week">Last 7 days</option>
                        <option value="all">All time</option>
                    </select>
                </div>
            </div>
        </div>
        <div id="search-results" class="mt-3"></div>
    </div>
</div>

<!-- Favorites Section -->
<div class="row mb-3" id="favorites-section" style="display: none;">
    <div class="col-12">
        <h5 id="favorites-header" style="cursor: pointer; user-select: none;">
            <i class="bi bi-chevron-right" id="favorites-chevron"></i>
            <i class="bi bi-star-fill text-warning"></i> Favorites
        </h5>
        <div id="favorites-list" class="list-group mb-3" style="display: none;">
        </div>
    </div>
</div>

<!-- Projects List -->
<div class="row">
    <div class="col-12">
        <h4><i class="bi bi-folder2-open"></i> Projects</h4>
        <div id="projects-list" class="list-group">
            <div class="text-center py-4">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Set default date filter to last 7 days
    document.getElementById('date-filter').value = 'week';
    document.getElementById('date-filter').addEventListener('change', loadProjects);

    // Favorites toggle
    document.getElementById('favorites-header').addEventListener('click', toggleFavorites);

    loadFavorites();
    loadProjects();
    initSearch();
});

function getDateFilter() {
    return document.getElementById('date-filter').value;
}

function loadProjects() {
    const dateFilter = getDateFilter();
    fetch(`/api/projects?date=${dateFilter}`)
        .then(response => response.json())
        .then(data => {
            const projects = data.projects || [];
            const tokenStats = data.token_stats || {};
            let totalSessions = 0;

            document.getElementById('projects-count').textContent = projects.length;

            // Update tokens display
            const inputK = formatTokens(tokenStats.input || 0);
            const outputK = formatTokens(tokenStats.output || 0);
            document.getElementById('tokens-count').textContent = `${inputK} / ${outputK}`;
            document.getElementById('tokens-count').title =
                `Input: ${(tokenStats.input || 0).toLocaleString()}\n` +
                `Output: ${(tokenStats.output || 0).toLocaleString()}\n` +
                `Cache Read: ${(tokenStats.cache_read || 0).toLocaleString()}\n` +
                `Cache Create: ${(tokenStats.cache_creation || 0).toLocaleString()}`;

            const listEl = document.getElementById('projects-list');

            if (projects.length === 0) {
                listEl.innerHTML = '<div class="text-center py-4 text-muted">No projects found for selected date</div>';
                document.getElementById('sessions-count').textContent = '0';
                return;
            }

            listEl.innerHTML = projects.map(p => {
                totalSessions += p.session_count || 0;
                const platformBadge = p.platform === 'codex'
                    ? '<span class="badge bg-info">Codex</span>'
                    : '<span class="badge bg-warning text-dark">Claude</span>';
                const tokensBadge = (p.total_input_tokens || p.total_output_tokens)
                    ? `<span class="badge bg-success ms-1">${formatTokens(p.total_input_tokens || 0)}/${formatTokens(p.total_output_tokens || 0)}</span>`
                    : '';
                return `
                    <a href="/project/${encodeURIComponent(p.id)}?platform=${p.platform}&date=${dateFilter}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                        <div>
                            <i class="bi bi-folder me-2"></i>
                            ${escapeHtml(p.name)}
                            ${platformBadge}
                            ${tokensBadge}
                        </div>
                        <span class="badge bg-secondary rounded-pill">${p.session_count || 0} sessions</span>
                    </a>
                `;
            }).join('');

            document.getElementById('sessions-count').textContent = totalSessions;
        })
        .catch(err => {
            console.error('Failed to load projects:', err);
            document.getElementById('projects-list').innerHTML =
                '<div class="alert alert-danger">Failed to load projects</div>';
        });
}

function formatTokens(n) {
    if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
    if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
    return n.toString();
}

function loadFavorites() {
    fetch('/api/favorites')
        .then(response => response.json())
        .then(data => {
            const favorites = data.favorites || [];
            const section = document.getElementById('favorites-section');
            const list = document.getElementById('favorites-list');

            if (favorites.length === 0) {
                section.style.display = 'none';
                return;
            }

            section.style.display = '';

            // Restore collapse state from localStorage
            const isExpanded = localStorage.getItem('favorites-expanded') === 'true';
            setFavoritesExpanded(isExpanded);

            list.innerHTML = favorites.map(fav => {
                const platformBadge = fav.platform === 'codex'
                    ? '<span class="badge bg-info">Codex</span>'
                    : '<span class="badge bg-warning text-dark">Claude</span>';
                const date = fav.cached_at ? new Date(fav.cached_at).toLocaleDateString() : '';
                const preview = fav.preview ? escapeHtml(fav.preview.substring(0, 100)) : '';

                return `
                    <a href="/conversation/${encodeURIComponent(fav.session_id)}?platform=${fav.platform}&project_id=${encodeURIComponent(fav.project || '')}" class="list-group-item list-group-item-action">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <div class="fw-bold">${escapeHtml(fav.project_name || fav.project || 'Unknown')}</div>
                                <small class="text-muted">${preview}${preview.length >= 100 ? '...' : ''}</small>
                            </div>
                            <div class="text-end">
                                ${platformBadge}
                                <br><small class="text-muted">${date}</small>
                            </div>
                        </div>
                    </a>
                `;
            }).join('');
        })
        .catch(err => {
            console.error('Failed to load favorites:', err);
        });
}

function toggleFavorites() {
    const list = document.getElementById('favorites-list');
    const isExpanded = list.style.display !== 'none';
    setFavoritesExpanded(!isExpanded);
    localStorage.setItem('favorites-expanded', !isExpanded);
}

function setFavoritesExpanded(expanded) {
    const list = document.getElementById('favorites-list');
    const chevron = document.getElementById('favorites-chevron');

    if (expanded) {
        list.style.display = '';
        chevron.classList.remove('bi-chevron-right');
        chevron.classList.add('bi-chevron-down');
    } else {
        list.style.display = 'none';
        chevron.classList.remove('bi-chevron-down');
        chevron.classList.add('bi-chevron-right');
    }
}

function initSearch() {
    const searchInput = document.getElementById('global-search');
    const searchBtn = document.getElementById('search-btn');
    const resultsEl = document.getElementById('search-results');

    function doSearch() {
        const query = searchInput.value.trim();
        if (!query) {
            resultsEl.innerHTML = '';
            return;
        }

        resultsEl.innerHTML = '<div class="text-center py-2"><div class="spinner-border spinner-border-sm"></div> Searching...</div>';

        fetch(`/api/search?q=${encodeURIComponent(query)}`)
            .then(response => response.json())
            .then(data => {
                const results = data.results || [];
                if (results.length === 0) {
                    resultsEl.innerHTML = '<div class="text-muted">No results found</div>';
                    return;
                }

                // Group by project
                const grouped = {};
                results.forEach(r => {
                    const key = r.project_name || 'Unknown';
                    if (!grouped[key]) {
                        grouped[key] = [];
                    }
                    grouped[key].push(r);
                });

                // Render grouped
                let html = '';
                for (const [project, items] of Object.entries(grouped)) {
                    html += `
                        <div class="mb-3">
                            <h6 class="text-muted mb-2">
                                <i class="bi bi-folder"></i> ${escapeHtml(project)}
                                <span class="badge bg-secondary ms-1">${items.length}</span>
                            </h6>
                            ${items.map(r => `
                                <div class="card mb-2">
                                    <div class="card-body py-2">
                                        <div class="d-flex justify-content-between">
                                            <span class="badge bg-${r.role === 'user' ? 'primary' : (r.role === 'tool_result' ? 'info text-dark' : 'secondary')}">${r.role === 'tool_result' ? 'Tool Result' : r.role}</span>
                                            <small class="text-muted">${r.timestamp ? new Date(r.timestamp).toLocaleDateString() : ''}</small>
                                        </div>
                                        <p class="mb-1 mt-2 small">${escapeHtml(r.content_preview)}</p>
                                        <a href="/conversation/${encodeURIComponent(r.session_id)}?platform=${r.platform}&project_id=${encodeURIComponent(r.project_id || '')}" class="btn btn-sm btn-outline-primary">View</a>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }
                resultsEl.innerHTML = html;
            })
            .catch(err => {
                console.error('Search failed:', err);
                resultsEl.innerHTML = '<div class="alert alert-danger">Search failed</div>';
            });
    }

    searchBtn.addEventListener('click', doSearch);
    searchInput.addEventListener('keypress', e => {
        if (e.key === 'Enter') doSearch();
    });
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
</script>
{% endblock %}
