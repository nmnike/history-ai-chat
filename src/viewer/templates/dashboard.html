{% extends "base.html" %}

{% block title %}Dashboard - History AI Chat{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-md-6">
        <div class="card bg-secondary text-white">
            <div class="card-body">
                <div class="d-flex align-items-center">
                    <i class="bi bi-chat-square-text fs-1 me-3"></i>
                    <div>
                        <h5 class="card-title mb-0">Sessions</h5>
                        <h2 id="sessions-count" class="mb-0">-</h2>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card bg-primary text-white">
            <div class="card-body">
                <div class="d-flex align-items-center">
                    <i class="bi bi-folder fs-1 me-3"></i>
                    <div>
                        <h5 class="card-title mb-0">Projects</h5>
                        <h2 id="projects-count" class="mb-0">-</h2>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Global Search -->
<div class="row mb-4">
    <div class="col-12">
        <div class="card">
            <div class="card-body">
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-search"></i></span>
                    <input type="text" id="global-search" class="form-control" placeholder="Search across all conversations...">
                    <button class="btn btn-primary" type="button" id="search-btn">Search</button>
                </div>
                <div id="search-results" class="mt-3"></div>
            </div>
        </div>
    </div>
</div>

<!-- Projects List -->
<div class="row">
    <div class="col-12">
        <h4><i class="bi bi-folder2-open"></i> Projects</h4>
        <div id="projects-list" class="list-group">
            <div class="text-center py-4">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    loadProjects();
    initSearch();
});

function loadProjects() {
    fetch('/api/projects')
        .then(response => response.json())
        .then(data => {
            const projects = data.projects || [];
            let totalSessions = 0;

            document.getElementById('projects-count').textContent = projects.length;

            const listEl = document.getElementById('projects-list');

            if (projects.length === 0) {
                listEl.innerHTML = '<div class="text-center py-4 text-muted">No projects found</div>';
                return;
            }

            listEl.innerHTML = projects.map(p => {
                totalSessions += p.session_count || 0;
                const platformBadge = p.platform === 'codex'
                    ? '<span class="badge bg-info">Codex</span>'
                    : '<span class="badge bg-warning text-dark">Claude</span>';
                return `
                    <a href="/project/${encodeURIComponent(p.id)}?platform=${p.platform}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                        <div>
                            <i class="bi bi-folder me-2"></i>
                            ${escapeHtml(p.name)}
                            ${platformBadge}
                        </div>
                        <span class="badge bg-secondary rounded-pill">${p.session_count || 0} sessions</span>
                    </a>
                `;
            }).join('');

            document.getElementById('sessions-count').textContent = totalSessions;
        })
        .catch(err => {
            console.error('Failed to load projects:', err);
            document.getElementById('projects-list').innerHTML =
                '<div class="alert alert-danger">Failed to load projects</div>';
        });
}

function initSearch() {
    const searchInput = document.getElementById('global-search');
    const searchBtn = document.getElementById('search-btn');
    const resultsEl = document.getElementById('search-results');

    function doSearch() {
        const query = searchInput.value.trim();
        if (!query) {
            resultsEl.innerHTML = '';
            return;
        }

        resultsEl.innerHTML = '<div class="text-center py-2"><div class="spinner-border spinner-border-sm"></div> Searching...</div>';

        fetch(`/api/search?q=${encodeURIComponent(query)}`)
            .then(response => response.json())
            .then(data => {
                const results = data.results || [];
                if (results.length === 0) {
                    resultsEl.innerHTML = '<div class="text-muted">No results found</div>';
                    return;
                }

                resultsEl.innerHTML = results.map(r => `
                    <div class="card mb-2">
                        <div class="card-body py-2">
                            <div class="d-flex justify-content-between">
                                <span class="badge bg-${r.role === 'user' ? 'primary' : 'secondary'}">${r.role}</span>
                                <small class="text-muted">${escapeHtml(r.project_name)}</small>
                            </div>
                            <p class="mb-1 mt-2 small">${escapeHtml(r.content_preview)}</p>
                            <a href="/conversation/${encodeURIComponent(r.session_id)}?platform=${r.platform}" class="btn btn-sm btn-outline-primary">View</a>
                        </div>
                    </div>
                `).join('');
            })
            .catch(err => {
                console.error('Search failed:', err);
                resultsEl.innerHTML = '<div class="alert alert-danger">Search failed</div>';
            });
    }

    searchBtn.addEventListener('click', doSearch);
    searchInput.addEventListener('keypress', e => {
        if (e.key === 'Enter') doSearch();
    });
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
</script>
{% endblock %}
